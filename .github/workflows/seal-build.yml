name: seal-build

# Produces the golang.org/x/net module source zip (v0.45.0.zip) on the fork's
# own CI and uploads it as a build artifact. The zip is created with Go's own
# golang.org/x/mod/zip.CreateFromDir, which applies the exact module-proxy
# inclusion rules (excludes .git/.github/dotfiles, nested modules, vendor/), so
# the file set matches proxy.golang.org by construction.

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build module-zip helper
        run: |
          set -euxo pipefail
          HELPER="$(mktemp -d)"
          cat > "$HELPER/create_mod.go" <<'EOF'
          package main

          import (
              "log"
              "os"

              "golang.org/x/mod/module"
              "golang.org/x/mod/zip"
          )

          func main() {
              if len(os.Args) != 5 {
                  log.Fatal("usage: create_mod <module-path> <version> <source-dir> <output-zip>")
              }
              m := module.Version{Path: os.Args[1], Version: os.Args[2]}
              f, err := os.Create(os.Args[4])
              if err != nil {
                  log.Fatal(err)
              }
              defer f.Close()
              if err := zip.CreateFromDir(f, m, os.Args[3]); err != nil {
                  log.Fatal(err)
              }
              log.Printf("created module zip: %s", os.Args[4])
          }
          EOF
          cd "$HELPER"
          go mod init example.com/mod
          # Pin x/mod to v0.24.0 — newer releases require Go 1.25+.
          go get golang.org/x/mod@v0.24.0
          go build -o "$HELPER/create_mod_bin" create_mod.go
          echo "HELPER=$HELPER" >> "$GITHUB_ENV"

      - name: Produce module zip
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/out"
          # CreateFromDir skips VCS dirs (.git) and nested modules but DESCENDS
          # into .github and includes its files. Upstream x/net ships no .github
          # dir, so remove our seal-added workflow dir before zipping — otherwise
          # seal-build.yml leaks into the module zip as an extra file. The running
          # job has already loaded its YAML, so deleting it on disk is safe.
          rm -rf "$GITHUB_WORKSPACE/.github"
          # Zip the checkout ($GITHUB_WORKSPACE). CreateFromDir now sees the exact
          # upstream file set (dotfiles like .gitignore/.gitattributes are kept,
          # matching the public proxy zip; vendor/ and nested modules excluded).
          "$HELPER/create_mod_bin" \
            golang.org/x/net \
            v0.45.0 \
            "$GITHUB_WORKSPACE" \
            "$RUNNER_TEMP/out/v0.45.0.zip"
          ls -l "$RUNNER_TEMP/out/v0.45.0.zip"

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: module-zip
          path: ${{ runner.temp }}/out/v0.45.0.zip
          if-no-files-found: error

      - name: Compile and test
        run: |
          set -euxo pipefail
          go build ./...
          go test ./...
